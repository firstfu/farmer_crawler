{{/*
  web/templates/layout.html
  農產品價差雷達系統 — 主版面配置
  提供 HTML 基礎結構，載入 Tailwind CSS、HTMX、ECharts
  定義 nav 導覽列與 main 內容區域
  子模板透過 "content" block 嵌入頁面內容
*/}}
{{define "layout"}}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-green-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">茭白筍價差雷達</h1>
            <span class="text-green-200 text-sm">{{.Date}}</span>
        </div>
    </nav>
    <main class="container mx-auto p-4">
        {{template "content" .}}
    </main>
</body>
</html>
{{end}}
