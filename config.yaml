app:
  port: 8080
  db_path: "./data/market.db"

crawler:
  api_url: "https://data.moa.gov.tw/Service/OpenData/FromM/FarmTransData.aspx"
  crop_name: "茭白筍"
  schedule: "0 10 * * *"
  retry_count: 3
  retry_interval: 30s
  batch_days: 7
  batch_delay: 2s
  backfill_days: 30
  backfill_on_start: true
  rate_limit: 1        # 每秒最多 N 個請求
  rate_burst: 3        # 突發容許量

analyzer:
  base_market_code: 400
  base_market_name: "台中市"
  crop_codes:
    - "SQ1"
    - "SQ3"
